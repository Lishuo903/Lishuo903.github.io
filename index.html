<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1d23">
    <title>蓝牙遥控小车</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuiTneeym+i/nOaOp+Wwj+i9piIsCiAgInNob3J0X25hbWUiOiAi6L+d5o6n6L2mIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMWExZDIzIiwKICAidGhlbWVfY29sb3IiOiAiIzFhMWQyMyIsCiAgIm9yaWVudGF0aW9uIjogInBvcnRyYWl0IiwKICAiaWNvbnMiOiBbXQp9">
    <style>
        :root {
            --bg: #1a1d23;
            --surface: #252830;
            --surface-light: #2e3139;
            --text: #e0e0e0;
            --text-secondary: #a0a4b0;
            --accent: #4fc3f7;
            --green: #4caf50;
            --red: #f44336;
            --yellow: #ffb74d;
            --border: #3a3d45;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 16px;
            --font-mono: monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
            gap: 20px;
            overflow: hidden;
            touch-action: manipulation;
        }
        .status-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .connection-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .status-dot.disconnected { background-color: var(--red); box-shadow: 0 0 8px var(--red); }
        .status-dot.connecting { background-color: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 0.8s ease-in-out infinite; }
        .status-dot.connected { background-color: var(--green); box-shadow: 0 0 8px var(--green); }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }
        .device-name {
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .speed-display {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .speed-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: var(--surface-light);
            border-radius: 10px;
            padding: 8px 14px;
            min-width: 70px;
        }
        .speed-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; }
        .speed-value { font-family:var(--font-mono); font-size:22px; font-weight:700; color:var(--accent); }
        .speed-value.positive { color:#4fc3f7; }
        .speed-value.negative { color:#ff8a65; }
        .speed-value.zero { color:var(--text-secondary); }
        .joystick-container {
            position: relative;
            width: min(300px, 75vw);
            height: min(300px, 75vw);
            flex-shrink: 0;
        }
        .joystick-container canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            touch-action: none;
            cursor: grab;
        }
        .joystick-container canvas:active { cursor: grabbing; }
        .joystick-hint {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            pointer-events: none;
        }
        .btn-connect {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 380px;
            padding: 15px 24px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.25s;
            color: #fff;
            background: var(--accent);
            box-shadow: 0 4px 16px rgba(79,195,247,0.3);
        }
        .btn-connect:active { transform: scale(0.96); }
        .btn-connect:disabled { background:#555; cursor:not-allowed; opacity:0.7; }
        .btn-connect.connected { background: var(--green); box-shadow: 0 4px 16px rgba(76,175,80,0.3); }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #333;
            color: #fff;
            padding: 12px 22px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.35s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 90vw;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #c62828; }
        .toast.success { background: #2e7d32; }
        .unsupported-banner {
            background: #3e2723;
            border: 1px solid #5d4037;
            color: #ffab91;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            display: none;
        }
        .unsupported-banner.visible { display: block; }
    </style>
</head>
<body>
    <div class="unsupported-banner" id="unsupportedBanner">
        ⚠️ 浏览器不支持 Web Bluetooth。<br>请使用 <strong>Chrome 或 Edge</strong>。
    </div>
    <div class="toast" id="toast"></div>
    <div class="status-card">
        <div class="status-row">
            <div class="connection-indicator">
                <span class="status-dot disconnected" id="statusDot"></span>
                <span id="statusText">未连接</span>
            </div>
            <span class="device-name" id="deviceName">—</span>
        </div>
        <div class="speed-display">
            <div class="speed-item"><span class="speed-label">左轮 L</span><span class="speed-value zero" id="leftSpeed">0</span></div>
            <div class="speed-item"><span class="speed-label">右轮 R</span><span class="speed-value zero" id="rightSpeed">0</span></div>
        </div>
    </div>
    <div class="joystick-container" id="joystickContainer">
        <canvas id="joystickCanvas" width="300" height="300"></canvas>
        <span class="joystick-hint">👆 拖动摇杆控制小车</span>
    </div>
    <button class="btn-connect" id="btnConnect"><span>🔗</span> 连接蓝牙小车</button>

    <script>
        (function() {
            const SERVICE_UUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
            const CHARACTERISTIC_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
            const SEND_INTERVAL_MS = 50;
            const MAX_SPEED = 1200;
            const JOYSTICK_MAX_OUTPUT = 100;
            const CANVAS_SIZE = 300;
            const CENTER = CANVAS_SIZE / 2;
            const BASE_RADIUS = 115;
            const HANDLE_RADIUS = 33;
            const MAX_HANDLE_OFFSET = BASE_RADIUS - HANDLE_RADIUS;

            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const deviceNameEl = document.getElementById('deviceName');
            const leftSpeedEl = document.getElementById('leftSpeed');
            const rightSpeedEl = document.getElementById('rightSpeed');
            const btnConnect = document.getElementById('btnConnect');
            const joystickCanvas = document.getElementById('joystickCanvas');
            const joystickContainer = document.getElementById('joystickContainer');
            const toast = document.getElementById('toast');
            const unsupportedBanner = document.getElementById('unsupportedBanner');

            let bluetoothDevice = null;
            let gattServer = null;
            let txCharacteristic = null;
            let isConnected = false;
            let isConnecting = false;
            let joystickX = 0;
            let joystickY = 0;
            let isDragging = false;
            let activePointerId = null;
            let sendIntervalId = null;
            let currentLeftSpeed = 0;
            let currentRightSpeed = 0;
            let toastTimer = null;

            function init() {
                if (!navigator.bluetooth) {
                    unsupportedBanner.classList.add('visible');
                    btnConnect.disabled = true;
                    btnConnect.textContent = '❌ 浏览器不支持';
                }
                setupCanvasDPI();
                drawJoystick(0, 0);
                bindEvents();
                window.addEventListener('resize', () => {
                    setupCanvasDPI();
                    drawJoystick(joystickX, joystickY);
                });
            }

            function setupCanvasDPI() {
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                joystickCanvas.width = CANVAS_SIZE * dpr;
                joystickCanvas.height = CANVAS_SIZE * dpr;
                joystickCanvas.style.width = joystickContainer.clientWidth + 'px';
                joystickCanvas.style.height = joystickContainer.clientWidth + 'px';
            }

            function drawJoystick(hx, hy) {
                const ctx = joystickCanvas.getContext('2d');
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                const cx = CENTER, cy = CENTER;
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                // 底座
                ctx.beginPath();
                ctx.arc(cx, cy, BASE_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = '#252830';
                ctx.fill();
                ctx.strokeStyle = '#4a4d58';
                ctx.lineWidth = 2;
                ctx.stroke();
                // 手柄
                const handleX = cx + hx;
                const handleY = cy + hy;
                ctx.beginPath();
                ctx.arc(handleX, handleY, HANDLE_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = '#4fc3f7';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            function updateJoystickFromEvent(e) {
                if (!isDragging) return;
                const rect = joystickCanvas.getBoundingClientRect();
                const scaleX = CANVAS_SIZE / rect.width;
                const scaleY = CANVAS_SIZE / rect.height;
                let cx, cy;
                if (e.touches) {
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === activePointerId) {
                            cx = e.touches[i].clientX;
                            cy = e.touches[i].clientY;
                            break;
                        }
                    }
                } else {
                    cx = e.clientX;
                    cy = e.clientY;
                }
                if (cx === undefined) return;
                const dx = (cx - rect.left) * scaleX - CENTER;
                const dy = (cy - rect.top) * scaleY - CENTER;
                const dist = Math.sqrt(dx*dx + dy*dy);
                let hx, hy;
                if (dist > MAX_HANDLE_OFFSET) {
                    const angle = Math.atan2(dy, dx);
                    hx = MAX_HANDLE_OFFSET * Math.cos(angle);
                    hy = MAX_HANDLE_OFFSET * Math.sin(angle);
                } else {
                    hx = dx;
                    hy = dy;
                }
                joystickX = Math.round((hx / MAX_HANDLE_OFFSET) * JOYSTICK_MAX_OUTPUT);
                joystickY = Math.round((-hy / MAX_HANDLE_OFFSET) * JOYSTICK_MAX_OUTPUT);
                joystickX = Math.max(-100, Math.min(100, joystickX));
                joystickY = Math.max(-100, Math.min(100, joystickY));
                drawJoystick(hx, hy);
                updateSpeedsFromJoystick();
            }

            function resetJoystick() {
                joystickX = 0;
                joystickY = 0;
                isDragging = false;
                activePointerId = null;
                drawJoystick(0, 0);
                updateSpeedsFromJoystick();
                stopSending();
            }

            function updateSpeedsFromJoystick() {
                let ls = joystickY * 12 + joystickX * 12;
                let rs = joystickY * 12 - joystickX * 12;
                ls = Math.round(Math.max(-MAX_SPEED, Math.min(MAX_SPEED, ls)));
                rs = Math.round(Math.max(-MAX_SPEED, Math.min(MAX_SPEED, rs)));
                currentLeftSpeed = ls;
                currentRightSpeed = rs;
                leftSpeedEl.textContent = ls;
                rightSpeedEl.textContent = rs;
                if (isConnected && (ls !== 0 || rs !== 0)) startSending();
            }

            function sendSpeedData() {
                if (!txCharacteristic || !isConnected) return;
                const str = currentLeftSpeed + ',' + currentRightSpeed + '\n';
                const enc = new TextEncoder();
                try {
                    if (txCharacteristic.properties.writeWithoutResponse) {
                        txCharacteristic.writeValueWithoutResponse(enc.encode(str));
                    } else if (txCharacteristic.properties.write) {
                        txCharacteristic.writeValue(enc.encode(str));
                    }
                } catch(e) {
                    handleDisconnection();
                }
            }

            function startSending() {
                if (sendIntervalId) return;
                sendSpeedData();
                sendIntervalId = setInterval(sendSpeedData, SEND_INTERVAL_MS);
            }

            function stopSending() {
                if (sendIntervalId) {
                    clearInterval(sendIntervalId);
                    sendIntervalId = null;
                }
                if (isConnected && txCharacteristic) {
                    try {
                        const z = '0,0\n';
                        const enc = new TextEncoder();
                        if (txCharacteristic.properties.writeWithoutResponse) {
                            txCharacteristic.writeValueWithoutResponse(enc.encode(z));
                        } else if (txCharacteristic.properties.write) {
                            txCharacteristic.writeValue(enc.encode(z));
                        }
                    } catch(e) {}
                }
            }

            async function connectToDevice() {
                if (isConnecting || isConnected) return;
                isConnecting = true;
                updateUI('connecting');
                btnConnect.disabled = true;
                btnConnect.innerHTML = '<span>⏳</span> 扫描中...';
                try {
                    // ★ 稳定写法：使用常见BLE Service UUID，兼容性最好
                    bluetoothDevice = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: 'JDY' }],
                        optionalServices: [
                            '0000ffe0-0000-1000-8000-00805f9b34fb',
                            '00001800-0000-1000-8000-00805f9b34fb',
                            '00001801-0000-1000-8000-00805f9b34fb',
                            '0000180a-0000-1000-8000-00805f9b34fb'
                        ]
                    });
                    deviceNameEl.textContent = bluetoothDevice.name || 'JDY设备';
                    btnConnect.innerHTML = '<span>🔗</span> 连接中...';
                    gattServer = await bluetoothDevice.gatt.connect();
                    const service = await gattServer.getPrimaryService(SERVICE_UUID);
                    txCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                    bluetoothDevice.addEventListener('gattserverdisconnected', handleDisconnection);
                    isConnected = true;
                    isConnecting = false;
                    updateUI('connected');
                    btnConnect.disabled = false;
                    btnConnect.innerHTML = '<span>✅</span> 已连接 - 点击断开';
                    btnConnect.classList.add('connected');
                    showToast('✅ 连接成功！', 'success');
                } catch(err) {
                    isConnecting = false;
                    updateUI('disconnected');
                    btnConnect.disabled = false;
                    btnConnect.innerHTML = '<span>🔗</span> 连接蓝牙小车';
                    btnConnect.classList.remove('connected');
                    deviceNameEl.textContent = '—';
                    if (err.name === 'NotFoundError' || err.message.includes('cancelled')) {
                        console.log('用户取消或没找到设备');
                    } else {
                        showToast('❌ ' + (err.message || '连接失败'), 'error');
                    }
                    bluetoothDevice = null;
                    gattServer = null;
                    txCharacteristic = null;
                }
            }

            async function disconnectDevice() {
                stopSending();
                if (gattServer && gattServer.connected) {
                    try { await gattServer.disconnect(); } catch(e) {}
                }
                cleanupConnection();
                updateUI('disconnected');
                btnConnect.classList.remove('connected');
                btnConnect.innerHTML = '<span>🔗</span> 连接蓝牙小车';
                deviceNameEl.textContent = '—';
            }

            function handleDisconnection() {
                stopSending();
                cleanupConnection();
                updateUI('disconnected');
                btnConnect.classList.remove('connected');
                btnConnect.innerHTML = '<span>🔗</span> 连接蓝牙小车';
                deviceNameEl.textContent = '—';
                showToast('⚠️ 蓝牙已断开', 'error');
            }

            function cleanupConnection() {
                if (bluetoothDevice) {
                    bluetoothDevice.removeEventListener('gattserverdisconnected', handleDisconnection);
                }
                bluetoothDevice = null;
                gattServer = null;
                txCharacteristic = null;
                isConnected = false;
            }

            function updateUI(state) {
                statusDot.className = 'status-dot ' + state;
                statusText.textContent = state === 'connected' ? '已连接' : state === 'connecting' ? '连接中...' : '未连接';
            }

            function showToast(msg, type) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.className = 'toast ' + (type || '') + ' show';
                toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500);
            }

            function bindEvents() {
                btnConnect.addEventListener('click', async () => {
                    if (isConnected) await disconnectDevice();
                    else if (!isConnecting) await connectToDevice();
                });
                joystickCanvas.addEventListener('touchstart', (e) => {
                    if (isDragging || e.touches.length === 0) return;
                    e.preventDefault();
                    isDragging = true;
                    activePointerId = e.touches[0].identifier;
                    updateJoystickFromEvent(e);
                }, { passive: false });
                joystickCanvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    updateJoystickFromEvent(e);
                }, { passive: false });
                joystickCanvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    let found = false;
                    for (let i = 0; i < e.touches.length; i++) {
                        if (e.touches[i].identifier === activePointerId) found = true;
                    }
                    if (!found) resetJoystick();
                });
                joystickCanvas.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    resetJoystick();
                });
                joystickCanvas.addEventListener('mousedown', (e) => {
                    if (isDragging) return;
                    e.preventDefault();
                    isDragging = true;
                    activePointerId = 'mouse';
                    updateJoystickFromEvent(e);
                });
                document.addEventListener('mousemove', (e) => {
                    if (isDragging && activePointerId === 'mouse') updateJoystickFromEvent(e);
                });
                document.addEventListener('mouseup', () => {
                    if (activePointerId === 'mouse') resetJoystick();
                });
            }

            init();
        })();
    </script>
</body>
</html>
