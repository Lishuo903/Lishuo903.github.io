<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width">
<title>JDY-31 扫描</title>
<style>
body{font:14px monospace;padding:10px;background:#111;color:#0f0}
button{padding:12px 24px;font-size:16px;margin:5px;border:0;border-radius:8px;background:#09f;color:#fff}
#log{border:1px solid #333;padding:10px;margin-top:10px;max-height:400px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<button onclick="scan()">扫描 JDY-31（按服务UUID筛选）</button>
<button onclick="scanAll()">扫描所有BLE</button>
<div id="log"></div>
<script>
const JDY_SERVICE = '0000ffe0-0000-1000-8000-00805f9b34fb';
const JDY_CHAR    = '0000ffe1-0000-1000-8000-00805f9b34fb';

function log(s){document.getElementById('log').textContent+=s+'\n'}

async function scan(){
  log('--- 搜索JDY-31服务 ---');
  try{
    let dev = await navigator.bluetooth.requestDevice({
      filters: [{services: [JDY_SERVICE]}],
      optionalServices: [JDY_SERVICE]
    });
    log('找到: '+dev.name+' ('+dev.id+')');
    log('连接...');
    let server = await dev.gatt.connect();
    log('已连接!');
    let service = await server.getPrimaryService(JDY_SERVICE);
    let char = await service.getCharacteristic(JDY_CHAR);
    log('串口特征已找到! 可以通信');
    log('');
    log('JDY-31 正常! 关闭此页,用遥控页面连接即可');
  }catch(e){
    log('失败: '+e.message);
  }
}

async function scanAll(){
  log('--- 扫描全部 ---');
  try{
    let dev = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: []
    });
    log('选中: '+dev.name+' ('+dev.id+')');
  }catch(e){
    log('取消: '+e.message);
  }
}
</script>
</body>
</html>
